<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2c5282"/>
    </linearGradient>
    <clipPath id="circ">
      <circle cx="32" cy="32" r="32"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <g clip-path="url(#circ)">
    <!-- Subtle wave -->
    <path d="M 0 54 Q 10 50 20 54 Q 30 58 40 54 Q 50 50 64 54 L 64 64 L 0 64 Z" fill="white" opacity="0.07"/>

    <!-- Palm trunk -->
    <path d="M 16 60 Q 14 44 18 20" stroke="#f6ad55" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Palm fronds -->
    <path d="M 18 20 Q 9 14 6 18"  stroke="#f6ad55" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 18 20 Q 23 11 27 14" stroke="#f6ad55" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 18 20 Q 12 11 12 9"  stroke="#f6ad55" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Car body -->
    <rect x="22" y="40" width="34" height="12" rx="3" fill="#f6ad55"/>

    <!-- Car roof -->
    <path d="M 26 40 L 30 33 L 51 33 L 55 40 Z" fill="#f6ad55"/>

    <!-- Windows -->
    <rect x="31" y="34" width="7" height="5" rx="1.5" fill="#1a365d" fill-opacity="0.55"/>
    <rect x="41" y="34" width="7" height="5" rx="1.5" fill="#1a365d" fill-opacity="0.55"/>

    <!-- Roof sign -->
    <rect x="35" y="30" width="12" height="3" rx="1" fill="white" opacity="0.9"/>

    <!-- Front wheel -->
    <circle cx="29" cy="52" r="4.5" fill="#1a365d"/>
    <circle cx="29" cy="52" r="1.8" fill="#f6ad55"/>

    <!-- Rear wheel -->
    <circle cx="49" cy="52" r="4.5" fill="#1a365d"/>
    <circle cx="49" cy="52" r="1.8" fill="#f6ad55"/>
  </g>
</svg>
